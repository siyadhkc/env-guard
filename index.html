
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>env_guard</title>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      max-width: 600px;
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #9da7b3;
      margin-bottom: 20px;
    }

    .code {
      background: #161b22;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      margin: 6px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
    }

    .primary {
      background: #238636;
      color: white;
    }

    .secondary {
      background: #30363d;
      color: #e6edf3;
    }

    footer {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #6e7681;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>env_guard</h1>
    <p>Detect and prevent secret leaks in your code and environment files.</p>

    <div class="code">
      pip install env_guard
    </div>

    <div class="code">
      env-guard scan .
    </div>

    <div>
      <a href="#" class="btn primary">GitHub Repo</a>
      <a href="#" class="btn secondary">Documentation</a>
    </div>

    <footer>
      Built for developers who care about security.
    </footer>
  </div>
</body>
</html>
